<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만두의 방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"맑은 고딕",sans-serif;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#fff8dc,#ffe4b5);
}

/* 움직이는 만두 배경 */
.background{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:1;
}

.dumpling{
    position:absolute;
    font-size:60px;
    animation:float linear infinite;
    opacity:0.8;
}

@keyframes float{
    0%{
        transform:translateY(110vh) rotate(0deg);
    }
    100%{
        transform:translateY(-150px) rotate(360deg);
    }
}

/* 가운데 카드 */
.card{
    position:relative;
    z-index:10;
    background:rgba(255,255,255,0.9);
    padding:40px 60px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}

/* 만두 */
.mandu{
    font-size:100px;
    animation:bounce 2s infinite;
}

/* 싹 */
.sprout{
    font-size:40px;
    display:block;
    margin-bottom:-25px;
    animation:grow 1.5s infinite alternate;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@keyframes grow{
    from{
        transform:scale(1) rotate(-5deg);
    }
    to{
        transform:scale(1.2) rotate(5deg);
    }
}

h1{
    color:#ff6f61;
    margin-top:15px;
    font-size:46px;
}

p{
    font-size:24px;
    margin-top:15px;
    color:#444;
}
</style>
</head>
<body>

<!-- 움직이는 만두 배경 -->
<div class="background">
    <div class="dumpling" style="left:5%;animation-duration:18s;">🥟</div>
    <div class="dumpling" style="left:15%;animation-duration:14s;">🥟</div>
    <div class="dumpling" style="left:28%;animation-duration:20s;">🥟</div>
    <div class="dumpling" style="left:40%;animation-duration:16s;">🥟</div>
    <div class="dumpling" style="left:52%;animation-duration:22s;">🥟</div>
    <div class="dumpling" style="left:64%;animation-duration:15s;">🥟</div>
    <div class="dumpling" style="left:76%;animation-duration:19s;">🥟</div>
    <div class="dumpling" style="left:88%;animation-duration:17s;">🥟</div>
</div>

<!-- 메인 내용 -->
<div class="card">

    <span class="sprout">🌱</span>
    <div class="mandu">🥟</div>

    <h1>만두의 방입니다.</h1>
    <p>안녕하세요!!</p>

</div>

</body>
</html>
