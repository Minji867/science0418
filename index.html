<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만두의 방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Pretendard","맑은 고딕",sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8f9fa,#eef6ff,#fff8f3);
}

/* 배경의 은은한 빛 */
.light{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:.45;
    animation:float 8s ease-in-out infinite;
}

.light:nth-child(1){
    width:280px;
    height:280px;
    background:#dbeafe;
    top:-70px;
    left:-50px;
}

.light:nth-child(2){
    width:240px;
    height:240px;
    background:#fde2e4;
    right:-40px;
    bottom:-40px;
    animation-delay:2s;
}

.light:nth-child(3){
    width:180px;
    height:180px;
    background:#fff3b0;
    top:20%;
    right:20%;
    animation-delay:4s;
}

@keyframes float{
    50%{
        transform:translateY(-25px) scale(1.1);
    }
}

/* 카드 */
.card{
    position:relative;
    z-index:10;
    width:650px;
    text-align:center;
    padding:60px;
    border-radius:30px;
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(15px);
    box-shadow:0 20px 40px rgba(0,0,0,.08);
}

h1{
    font-size:56px;
    color:#3b3b3b;
    font-weight:700;
    margin-bottom:18px;
}

.line{
    width:80px;
    height:3px;
    margin:20px auto;
    background:#8bb7ff;
    border-radius:10px;
}

p{
    font-size:24px;
    color:#666;
    line-height:1.8;
}

/* 버튼 */
button{
    margin-top:45px;
    padding:16px 48px;
    font-size:22px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#7aa8ff,#8ec5fc);
    transition:.3s;
    box-shadow:0 10px 25px rgba(122,168,255,.35);
}

button:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 18px 35px rgba(122,168,255,.45);
}
</style>
</head>

<body>

<div class="light"></div>
<div class="light"></div>
<div class="light"></div>

<div class="card">

    <h1>만두의 방 입니다</h1>

    <div class="line"></div>

    <p>안녕하세요!!</p>
    <p>편안하게 둘러보고 즐거운 시간 보내세요.</p>

    <button onclick="startPage()">
        시작하기
    </button>

</div>

<script>
function startPage(){
    alert("환영합니다! 😊");
}
</script>

</body>
</html>
