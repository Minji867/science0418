<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만두의 방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#87CEEB,#C8F7C5);
    font-family:"맑은 고딕",sans-serif;
}

/* 배경 */
.background{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* 움직이는 동물 */
.animal{
    position:absolute;
    font-size:55px;
    animation:move linear infinite;
}

@keyframes move{
    0%{
        transform:translateX(-120px);
    }
    100%{
        transform:translateX(110vw);
    }
}

/* 중앙 카드 */
.card{
    position:relative;
    z-index:10;
    background:rgba(255,255,255,0.85);
    padding:45px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    color:#ff6b81;
    font-size:48px;
    margin-bottom:20px;
}

p{
    font-size:24px;
    margin:10px;
    color:#555;
}
</style>

</head>
<body>

<div class="background">

<div class="animal" style="top:5%;animation-duration:18s;">🐶</div>
<div class="animal" style="top:15%;animation-duration:25s;">🐱</div>
<div class="animal" style="top:25%;animation-duration:22s;">🐰</div>
<div class="animal" style="top:35%;animation-duration:19s;">🦊</div>
<div class="animal" style="top:45%;animation-duration:23s;">🐻</div>
<div class="animal" style="top:55%;animation-duration:21s;">🐼</div>
<div class="animal" style="top:65%;animation-duration:24s;">🐯</div>
<div class="animal" style="top:75%;animation-duration:20s;">🦁</div>
<div class="animal" style="top:85%;animation-duration:26s;">🐨</div>

</div>

<div class="card">
    <h1>만두의 방입니다.</h1>
    <p>안녕하세요!!</p>
    <p>잘 부탁드려요 😊</p>
</div>

</body>
</html>
