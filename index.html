<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우주 과학 홈페이지</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
height:100vh;overflow:hidden;color:#fff;
background:linear-gradient(to bottom,#020111,#07142b,#101d42);
display:flex;justify-content:center;align-items:center;flex-direction:column}
.stars{position:fixed;inset:0;background-image:radial-gradient(white 1px,transparent 1px);background-size:60px 60px;animation:move 45s linear infinite;opacity:.8}
@keyframes move{from{transform:translateY(0)}to{transform:translateY(400px)}}
.sideMenu{position:fixed;top:20px;left:20px;width:250px;background:rgba(0,20,50,.7);border:2px solid cyan;border-radius:15px;padding:12px;backdrop-filter:blur(6px);z-index:10}
.sideMenu a{display:block;color:#fff;text-decoration:none;padding:10px;border-radius:8px;margin:5px 0}
.sideMenu a:hover{background:cyan;color:#001b33}
.alien{font-size:120px;animation:float 3s ease-in-out infinite;z-index:2}
@keyframes float{50%{transform:translateY(-20px)}}
h1{margin:15px;text-shadow:0 0 20px cyan;z-index:2}
button{padding:16px 40px;font-size:22px;border:none;border-radius:40px;background:cyan;color:#002244;font-weight:bold;cursor:pointer;box-shadow:0 0 20px cyan;z-index:2}
.popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#081425;border:2px solid cyan;padding:20px 35px;border-radius:15px;z-index:20}
</style>
</head>
<body>
<div class="stars"></div>

<div class="sideMenu">
<a href="#">1단원 물질의 특성</a>
<a href="#">2단원 지권의 변화</a>
<a href="#">3단원 빛과 파동</a>
<a href="https://sciencej1.cafe24.com/html5/sci2/elementsymbol.html" target="_blank">4단원 물질의 구성</a>
<a href="#">5단원 식물과 에너지</a>
<a href="#">6단원 동물과 에너지</a>
<a href="#">7단원 전기와 자기</a>
<a href="#">8단원 별과 우주</a>
</div>

<div class="alien">👽</div>
<h1>🚀 우주 과학 홈페이지</h1>
<button onclick="start()">시작하기</button>
<div class="popup" id="popup">🤖 삐빅! 접속중입니다...</div>

<script>
function beep(){
const a=new (window.AudioContext||window.webkitAudioContext)();
const o=a.createOscillator(),g=a.createGain();
o.connect(g);g.connect(a.destination);
o.frequency.value=900;g.gain.value=.15;
o.start();o.stop(a.currentTime+0.15);
}
function start(){
beep();
const p=document.getElementById("popup");
p.style.display="block";
setTimeout(()=>p.style.display="none",1800);
}
</script>
</body>
</html>
