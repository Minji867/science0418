<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>만두의 방</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "맑은 고딕", Arial, sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9f5ff);
        }

        .container {
            background: #ffffff;
            padding: 50px 70px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 48px;
            color: #ff7a59;
            margin-bottom: 20px;
        }

        p {
            font-size: 24px;
            color: #555;
        }

        .emoji {
            font-size: 70px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="emoji">🥟</div>
        <h1>만두의 방 입니다</h1>
        <p>안녕하세요!! 👋</p>
    </div>

</body>
</html>
