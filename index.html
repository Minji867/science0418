<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만두의 방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:"맑은 고딕",sans-serif;
    background:linear-gradient(#FFF8DC,#FFE4B5);
}

/* 움직이는 만두 배경 */
.background{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.mandu{
    position:absolute;
    font-size:60px;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-150px) rotate(360deg);
    }
}

/* 메인 화면 */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:rgba(255,255,255,0.9);
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.card h1{
    color:#ff6b6b;
    font-size:48px;
}

.card p{
    font-size:24px;
    margin-top:15px;
}

.sprout{
    color:#2E8B57;
    font-weight:bold;
}

/* 시작 버튼 */
button{
    margin-top:30px;
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:30px;
    background:#ff9f43;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff6b6b;
    transform:scale(1.08);
}
</style>
</head>
<body>

<div class="background">
    <div class="mandu" style="left:5%;animation-duration:14s;">🥟</div>
    <div class="mandu" style="left:15%;animation-duration:18s;">🥟</div>
    <div class="mandu" style="left:28%;animation-duration:20s;">🥟</div>
    <div class="mandu" style="left:40%;animation-duration:15s;">🥟</div>
    <div class="mandu" style="left:52%;animation-duration:17s;">🥟</div>
    <div class="mandu" style="left:65%;animation-duration:21s;">🥟</div>
    <div class="mandu" style="left:78%;animation-duration:16s;">🥟</div>
    <div class="mandu" style="left:90%;animation-duration:19s;">🥟</div>
</div>

<div class="container">
    <div class="card">
        <h1>🥟 만두의 방입니다.</h1>

        <p>안녕하세요!! 👋</p>

        <p class="sprout">🌱 만두에 싹이 나서 잎이 났어요!</p>

        <button onclick="startRoom()">▶ 시작하기</button>
    </div>
</div>

<script>
function startRoom(){
    alert("🥟 만두의 방에 오신 것을 환영합니다! 😊");
}
</script>

</body>
</html>
