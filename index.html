<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만두의 방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:"Pretendard","맑은 고딕",sans-serif;

    /* 미래 도시 배경 */
    background:
        linear-gradient(rgba(5,10,25,0.45), rgba(5,10,25,0.55)),
        url("future-city.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* 은은한 빛 효과 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,255,.18), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(120,120,255,.18), transparent 35%),
        radial-gradient(circle at 50% 90%, rgba(255,255,255,.08), transparent 40%);
    animation: glow 8s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        transform:scale(1);
        opacity:.7;
    }
    to{
        transform:scale(1.1);
        opacity:1;
    }
}

/* 카드 */
.card{
    position:relative;
    z-index:2;
    width:700px;
    padding:60px;
    text-align:center;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.25);
    border-radius:30px;

    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

h1{
    color:white;
    font-size:56px;
    letter-spacing:3px;
}

.line{
    width:90px;
    height:3px;
    margin:25px auto;
    background:#7fdcff;
}

p{
    color:#eef7ff;
    font-size:24px;
    line-height:1.8;
}

button{
    margin-top:45px;
    padding:18px 60px;

    border:none;
    border-radius:50px;

    background:linear-gradient(90deg,#33d6ff,#6b8cff);

    color:white;
    font-size:22px;
    font-weight:bold;

    cursor:pointer;
    transition:.35s;
}

button:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 0 25px rgba(51,214,255,.6);
}

footer{
    margin-top:30px;
    color:rgba(255,255,255,.7);
    font-size:15px;
}
</style>
</head>

<body>

<div class="card">

<h1>만두의 방 입니다</h1>

<div class="line"></div>

<p>안녕하세요!!</p>
<p>편안하게 방문해 주셔서 감사합니다.</p>

<button onclick="startPage()">
시작하기
</button>

<footer>
Welcome to Mandu's Room
</footer>

</div>

<script>
function startPage(){
    alert("환영합니다! 즐거운 시간 보내세요. 😊");
}
</script>

</body>
</html>
