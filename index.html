<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우주 홈페이지</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
cursor:url("https://cur.cursors-4u.net/others/oth-5/oth510.cur"),auto;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(to bottom,#020111,#07142b,#101d42);
font-family:'Arial';
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

/* 별 */
.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:70px 70px;
animation:moveStars 60s linear infinite;
opacity:.8;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(500px);}
}

/* 외계인 */
.alien{
font-size:130px;
animation:float 3s ease-in-out infinite;
z-index:2;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

h1{
font-size:55px;
margin-top:10px;
text-shadow:0 0 20px cyan;
z-index:2;
}

button{
margin-top:40px;
padding:18px 55px;
font-size:25px;
border:none;
border-radius:50px;
background:cyan;
color:#001b33;
font-weight:bold;
cursor:pointer;
transition:.3s;
box-shadow:0 0 30px cyan;
z-index:2;
}

button:hover{
transform:scale(1.1);
background:white;
}

/* 접속창 */
.popup{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:#0b1325;
border:2px solid cyan;
padding:20px 40px;
border-radius:20px;
display:none;
box-shadow:0 0 30px cyan;
font-size:22px;
animation:pop .3s;
z-index:5;
}

@keyframes pop{
from{
transform:translate(-50%,-50%) scale(.4);
opacity:0;
}
to{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="alien">👽</div>

<h1>🚀 우주에 오신 것을 환영합니다</h1>

<button onclick="start()">시작하기</button>

<div class="popup" id="popup">
🤖 삐빅! 접속중입니다...
</div>

<script>

function beep(){

const audio=new AudioContext();

const osc=audio.createOscillator();

const gain=audio.createGain();

osc.connect(gain);

gain.connect(audio.destination);

osc.type="square";

osc.frequency.value=900;

gain.gain.value=.2;

osc.start();

osc.stop(audio.currentTime+0.15);

}

function start(){

beep();

document.getElementById("popup").style.display="block";

setTimeout(()=>{
document.getElementById("popup").style.display="none";
},2500);

}

</script>

</body>
</html>
